name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm turbo build --filter=@obs/shared --filter=@obs/sdk

      - name: Typecheck
        run: pnpm turbo typecheck

      - name: Lint
        run: pnpm turbo lint

      - name: Test
        run: pnpm turbo test

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    strategy:
      matrix:
        service: [ingest-service, query-service, alert-service, web]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f apps/${{ matrix.service }}/Dockerfile -t obs-${{ matrix.service }}:ci .
